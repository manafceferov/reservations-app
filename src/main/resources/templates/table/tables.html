<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Restoran')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container">
    <h4 class="section-title mb-4">🍽️ Restoran Masaları</h4>

    <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3">Mövcud masaları yoxla</h6>
        <form th:action="@{/web/tables/available}" method="get" class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Tarix</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Vaxt</label>
                <input type="time" name="time" class="form-control" required>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">Axtar</button>
            </div>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(tables)}" class="text-center text-muted py-5">
        <i class="bi bi-table fs-1"></i>
        <p class="mt-3">Heç bir masa tapılmadı.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="table : ${tables}">
            <div class="card p-4 h-100">
                <h5 class="fw-bold mb-1" th:text="'Masa №' + ${table.tableNumber}"></h5>
                <p class="text-muted small mb-1"><i class="bi bi-geo-alt"></i> <span th:text="${table.location}"></span>
                </p>
                <p class="text-muted small"><i class="bi bi-people"></i> <span th:text="${table.capacity}"></span> nəfər
                </p>
                <div class="mt-auto">
                    <a th:href="@{/web/tables/reserve/{id}(id=${table.id})}" class="btn btn-primary w-100">Rezerv et</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
