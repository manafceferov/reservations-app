<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Otaq rezervasiyası')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card p-4">
                <h4 class="fw-bold mb-1">Otaq Rezervasiyası</h4>
                <p class="text-muted mb-4" th:text="'Otaq ' + ${room.roomNumber} + ' — ' + ${room.roomType}"></p>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/web/rooms/reserve}" method="post">
                    <input type="hidden" name="roomId" th:value="${room.id}">

                    <div class="mb-3">
                        <label class="form-label">Giriş tarixi</label>
                        <input type="date" name="checkIn" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Çıxış tarixi</label>
                        <input type="date" name="checkOut" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Qonaq sayı</label>
                        <input type="number" name="guestCount" class="form-control" value="1" min="1"
                               th:max="${room.capacity}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Qeyd</label>
                        <textarea name="notes" class="form-control" rows="2"
                                  placeholder="Xüsusi istək varsa..."></textarea>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted">Gecəlik: <strong class="text-warning"
                                                                  th:text="'₼' + ${room.pricePerNight}"></strong></span>
                        <button type="submit" class="btn btn-primary px-4">Rezerv et</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
