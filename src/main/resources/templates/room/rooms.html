<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Otaqlar')}"></head>
<body> <nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container">
    <h4 class="section-title mb-4">🛏️ Otaqlar</h4>

    <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3">Mövcud otaqları yoxla</h6>
        <form th:action="@{/web/rooms/available}" method="get" class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Giriş tarixi</label>
                <input type="date" name="checkIn" class="form-control" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Çıxış tarixi</label>
                <input type="date" name="checkOut" class="form-control" required>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">Axtar</button>
            </div>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(rooms)}" class="text-center text-muted py-5">
        <i class="bi bi-door-closed fs-1"></i>
        <p class="mt-3">Heç bir otaq tapılmadı.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-4" th:each="room : ${rooms}">
            <div class="card p-4 h-100">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="fw-bold mb-0" th:text="'Otaq ' + ${room.roomNumber}"></h5>
                    <span class="badge room-badge"
                          th:classappend="${room.roomType == 'STANDARD'} ? 'bg-standard' :
                                         (${room.roomType == 'DELUXE'} ? 'bg-deluxe' :
                                         (${room.roomType == 'SUITE'} ? 'bg-suite' :
                                         (${room.roomType == 'VIP'} ? 'bg-vip' : 'badge-gold')))"
                          th:text="${room.roomType}">
                    </span>
                </div>
                <p class="text-muted small" th:text="${room.description}"></p>
                <div class="mt-auto">
                    <div class="d-flex justify-content-between mb-3">
                        <span><i class="bi bi-people"></i> <span th:text="${room.capacity}"></span> nəfər</span>
                        <span class="fw-bold text-warning" th:text="'₼' + ${room.pricePerNight} + '/gecə'"></span>
                    </div>
                    <a th:href="@{/web/rooms/reserve/{id}(id=${room.id})}" class="btn btn-primary w-100">Rezerv et</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
